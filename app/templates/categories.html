{% extends "base.html" %}

{% block title %}Категории{% endblock %}

{% block content %}
<h2>Мои категории</h2>

{% if categories %}
    {% for category in categories %}
        <div class="card">
            <strong>{{ category.id }}</strong> — {{ category.name }}
        </div>
    {% endfor %}
{% else %}
    <p>Категорий пока нет.</p>
{% endif %}

{% endblock %}
